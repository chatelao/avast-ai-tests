name: Verify All Models Response

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-models:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        model:
          - 'facebook/opt-125m'
          - 'google/gemma-4-E2B-it'
          - 'google/gemma-4-E4B-it'
          - 'google/gemma-4-26B-A4B-it'
          - 'google/gemma-4-31B-it'
          - 'google/gemma-2-9b-it'
          - 'mistralai/Mistral-Large-3-675B-Instruct-2512'
          - 'mistralai/Mistral-Small-4-119B-2603'
          - 'mistralai/Mistral-Medium-3.5-128B'
          - 'mistralai/Ministral-3-3B-Instruct-2512'
          - 'mistralai/Ministral-3-8B-Instruct-2512'
          - 'mistralai/Ministral-3-14B-Instruct-2512'
          - 'mistralai/Devstral-2-123B-Instruct-2512'
          - 'mistralai/Codestral-2'
          - 'Qwen/Qwen2.5-Coder-32B-Instruct'
          - 'deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct'
          - 'moonshotai/Kimi-K2.5'
          - 'tiiuae/Falcon3-10B-Instruct'
          - 'meta-llama/Llama-4-Maverick-17B-128E-Instruct'
          - 'Qwen/Qwen3-235B-A22B'
          - 'zai-org/GLM-4.6'
          - 'openai/gpt-oss-120b'
          - 'Qwen/Qwen3-235B-A22B-Instruct-2507'
          - 'deepseek-ai/DeepSeek-V4-Flash'
          - 'deepseek-ai/DeepSeek-V4-Pro'
          - 'deepseek-ai/DeepSeek-V3.2'
          - 'deepseek-ai/DeepSeek-R1'
          - 'meta-llama/Llama-4-Scout-400B-Instruct'
          - 'mistralai/Devstral-2-123B-Instruct'
          - 'mistralai/Codestral-v0.2'
          - 'Qwen/Qwen-3.6-35B-A3B'
          - 'zai-org/GLM-5.1'
          - 'moonshotai/Kimi-K2.6'
          - 'step-ai/Step-3.5-Flash'
          - 'ibm/Granite-4.0-8B-Instruct'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install vastai aiohttp requests

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        # Wait for mock server to be ready
        timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/models; do sleep 1; done' || (echo "Mock server failed to start" && exit 1)

    - name: Verify Model
      env:
        VAST_AI_API_KEY: "mock-key"
        VAST_API_URL: "http://localhost:8000"
        HF_TOKEN: "mock-hf-token"
      run: |
        echo "--- Launching ${{ matrix.model }} ---"
        python launch.py --gpu "RTX_4090" --model "${{ matrix.model }}"

        echo "--- Polling ---"
        python poll.py --timeout 60 --interval 1

        echo "--- Verifying 'hello' response ---"
        python tests/hello_check.py --model "${{ matrix.model }}"

        echo "--- Teardown ---"
        python teardown.py
