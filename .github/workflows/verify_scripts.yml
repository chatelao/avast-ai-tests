name: Verify Scripting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-with-mock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        # Wait for mock server to be ready
        timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/models; do sleep 1; done' || (echo "Mock server failed to start" && exit 1)

    - name: Execute End-to-End Script Sequence
      env:
        VAST_API_URL: http://localhost:8000
        VAST_AI_API_KEY: mock-key
        HF_TOKEN: mock-token
      run: |
        echo "--- Launching ---"
        python launch.py --gpu "RTX_4090" --model "tiny-model"

        echo "--- Polling ---"
        # We need to speed up polling for the mock test
        # The mock becomes 'running' after 2 seconds
        # We'll use the default polling which has 20s sleep, so it should be fast enough
        python poll.py

        echo "--- Benchmarking ---"
        python benchmark.py --gpu "RTX 4090" --model "tiny-model" --concurrency-levels 1 2 --requests-per-level 5

        echo "--- Teardown ---"
        python teardown.py

    - name: Check benchmark results
      run: |
        ls benchmark_RTX_4090_*.json
        cat benchmark_RTX_4090_*.json | jq '.'
