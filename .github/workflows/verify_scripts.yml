name: Verify Scripting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install vLLM with CPU support
        pip install vllm --extra-index-url https://download.pytorch.org/whl/cpu

    - name: Run vLLM server
      run: |
        # Use a very small model (facebook/opt-125m) and CPU mode
        python -m vllm.entrypoints.openai.api_server \
          --model facebook/opt-125m \
          --device cpu \
          --dtype half \
          --enforce-eager \
          --max-model-len 1024 &

        # Wait for vLLM to be ready
        timeout 300 bash -c 'until curl -s http://localhost:8000/v1/models; do sleep 5; done'

    - name: Run Orchestrator against vLLM
      run: |
        python orchestrator.py \
          --url http://localhost:8000 \
          --model facebook/opt-125m \
          --gpu mock-cpu-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5 \
          --run

    - name: Check benchmark results
      run: |
        ls benchmark_mock-cpu-gpu_*.json
        cat benchmark_mock-cpu-gpu_*.json | jq '.'
