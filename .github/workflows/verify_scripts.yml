name: Verify Scripting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-with-mock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        # Wait for mock server to be ready
        timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/models; do sleep 1; done' || (echo "Mock server failed to start" && exit 1)

    - name: Run benchmark against mock server
      run: |
        python benchmark.py \
          --url http://localhost:8000 \
          --model tiny-model \
          --gpu mock-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5

    - name: Check benchmark results
      run: |
        ls benchmark_mock-gpu_*.json
        cat benchmark_mock-gpu_*.json | jq '.'

    - name: Teardown mock
      if: always()
      run: |
        kill $(lsof -t -i :8000) 2>/dev/null || true

  verify-on-vast:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Launch
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python launch.py \
          --gpu "RTX_4090" \
          --model "facebook/opt-125m" \
          --template-hash "38b2b68cf896e8582dff6f305a2041b1"

    - name: Poll
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python poll.py

    - name: Benchmark
      run: |
        python benchmark.py \
          --gpu "RTX_4090" \
          --model "facebook/opt-125m" \
          --concurrency-levels 1 \
          --requests-per-level 5

    - name: Teardown
      if: always()
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python teardown.py
