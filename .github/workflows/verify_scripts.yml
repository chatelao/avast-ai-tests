name: Verify Scripting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-with-mock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        # Wait for mock server to be ready
        timeout 30 bash -c 'until curl -sf http://localhost:8000/v1/models; do sleep 1; done' || (echo "Mock server failed to start" && exit 1)

    - name: End-to-End Mock Test
      env:
        VAST_AI_API_KEY: "mock-key"
        VAST_API_URL: "http://localhost:8000"
        HF_TOKEN: "mock-hf-token"
      run: |
        echo "--- Launch ---"
        python launch.py --gpu "RTX_4090" --model "facebook/opt-125m"

        echo "--- Poll ---"
        # Use short interval for faster CI
        python poll.py --timeout 60 --interval 1

        echo "--- Benchmark (LLMPerf) ---"
        python benchmark.py \
          --model facebook/opt-125m \
          --gpu mock-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5 \
          --benchmark-type llmperf

        echo "--- Benchmark (vLLM) ---"
        python benchmark.py \
          --model facebook/opt-125m \
          --gpu mock-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5 \
          --benchmark-type vllm

        echo "--- Teardown ---"
        python teardown.py

    - name: Check benchmark results
      run: |
        ls benchmark_*_mock-gpu_*.json
        cat benchmark_*_mock-gpu_*.json | jq '.'
