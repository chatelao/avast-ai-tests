name: Verify Scripting

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-with-mock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mock server
      run: |
        python tests/mock_server.py &
        sleep 5

    - name: Run Orchestrator against mock server
      run: |
        python orchestrator.py \
          --url http://localhost:8000 \
          --model tiny-model \
          --gpu mock-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5 \
          --run

    - name: Check benchmark results
      run: |
        ls benchmark_mock-gpu_*.json
        cat benchmark_mock-gpu_*.json | jq '.'

  verify-with-vllm:
    runs-on: ubuntu-latest
    env:
      VLLM_TARGET_DEVICE: cpu
      VLLM_DEVICE: cpu
      VLLM_NO_USAGE_STATS: 1
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install vLLM-CPU which is optimized for CPU-only environments
        pip install vllm-cpu --extra-index-url https://download.pytorch.org/whl/cpu
        # Patch vLLM to correctly detect CPU platform in CI
        VLLM_SITE_PKG=$(python -c "import vllm; import os; print(os.path.dirname(vllm.__file__))")
        sed -i 's/vllm_version = version("vllm")/vllm_version = "cpu"/g' "$VLLM_SITE_PKG/platforms/__init__.py"

    - name: Run vLLM server
      run: |
        # Use a very small model (facebook/opt-125m) and CPU mode
        # dtype float is safer on CPU than half or auto
        vllm serve facebook/opt-125m \
          --device cpu \
          --dtype float \
          --enforce-eager \
          --max-model-len 1024 \
          --kv-cache-dtype fp8 \
          --disable-log-stats &

        # Wait for vLLM to be ready
        # If vLLM fails to start (e.g. CPU instruction set mismatch), we'll catch it in the next step
        timeout 300 bash -c 'until curl -s http://localhost:8000/v1/models; do sleep 10; done' || (echo "vLLM failed to start within timeout" && exit 1)

    - name: Run Orchestrator against vLLM
      run: |
        python orchestrator.py \
          --url http://localhost:8000 \
          --model facebook/opt-125m \
          --gpu mock-cpu-gpu \
          --concurrency-levels 1 2 \
          --requests-per-level 5 \
          --run

    - name: Check benchmark results
      run: |
        ls benchmark_mock-cpu-gpu_*.json
        cat benchmark_mock-cpu-gpu_*.json | jq '.'
