name: Vast.ai LLM Benchmark

on:
  workflow_dispatch:
    inputs:
      gpu:
        description: 'GPU model to test'
        required: true
        default: 'RTX_4090'
        type: choice
        options:
        - 'RTX_3090'
        - 'RTX_4090'
        - 'A100_SXM4'
        - 'A100_PCIE'
        - 'H100_SXM'
        - 'H100_NVL'
        - 'H100_PCIE'
        - 'H200'
        - 'H200_NVL'
        - 'B200'
      num_gpus:
        description: 'Number of GPUs'
        required: true
        default: '1'
        type: choice
        options:
        - '1'
        - '2'
        - '4'
      model:
        description: 'LLM model name'
        required: true
        default: 'facebook/opt-125m'
        type: choice
        options:
        - 'facebook/opt-125m'
        - 'google/gemma-4-E2B-it'
        - 'google/gemma-4-E4B-it'
        - 'google/gemma-4-26B-A4B-it'
        - 'google/gemma-4-31B-it'
        - 'google/gemma-2-9b-it'
        - 'mistralai/Mistral-Small-Instruct-2409'
        - 'mistralai/Mistral-Large-Instruct-2411'
        - 'Qwen/Qwen2.5-Coder-32B-Instruct'
        - 'deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct'
        - 'mistralai/Codestral-22B-v0.1'
        - 'moonshotai/Kimi-K2.5'
        - 'tiiuae/Falcon3-10B-Instruct'
        - 'meta-llama/Llama-4-Maverick-17B-128E-Instruct'
        - 'Qwen/Qwen3-235B-A22B'
        - 'zai-org/GLM-4.6'
        - 'openai/gpt-oss-120b'
        - 'Qwen/Qwen3-235B-A22B-Instruct-2507'
      concurrency_levels:
        description: 'Space-separated concurrency levels'
        required: true
        default: '1 4 16'
      requests_per_level:
        description: 'Number of requests per concurrency level'
        required: true
        default: '10'
      template:
        description: 'Vast.ai template hash or Docker image'
        required: true
        default: 'ec39532d451faf9c79cddf8566f04b6c'
        type: choice
        options:
        - 'ec39532d451faf9c79cddf8566f04b6c'
        - '119393d230e84d5a0b41972676d23dce'
        - '38b2b68cf896e8582dff6f305a2041b1'
        - 'vllm/vllm-openai:latest'
        - 'eef02f9e58d95382d4bb122a35c7df04'
      disk:
        description: 'Disk size in GB'
        required: true
        default: '40'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Launch
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python launch.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --num-gpus "${{ github.event.inputs.num_gpus }}" \
          --model "${{ github.event.inputs.model }}" \
          --template "${{ github.event.inputs.template }}" \
          --disk "${{ github.event.inputs.disk }}"

    - name: Poll
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python poll.py

    - name: Benchmark
      run: |
        python benchmark.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --num-gpus "${{ github.event.inputs.num_gpus }}" \
          --model "${{ github.event.inputs.model }}" \
          --concurrency-levels ${{ github.event.inputs.concurrency_levels }} \
          --requests-per-level ${{ github.event.inputs.requests_per_level }}

    - name: Teardown
      if: always()
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python teardown.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          results.json
          benchmark_*.json
        if-no-files-found: error
