name: Vast.ai LLM Benchmark

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      gpu:
        description: 'GPU model to test'
        required: true
        default: 'RTX_4090'
        type: choice
        options:
        - 'RTX_3090'
        - 'RTX_4090'
        - 'A100_SXM4'
        - 'A100_PCIE'
        - 'H100_SXM'
        - 'H100_NVL'
        - 'H100_PCIE'
        - 'H200'
        - 'H200_NVL'
        - 'B200'
      num_gpus:
        description: 'Number of GPUs'
        required: true
        default: '1'
        type: choice
        options:
        - '1'
        - '2'
        - '4'
      model:
        description: 'LLM model name'
        required: true
        default: 'google/gemma-4-E2B-it'
        type: choice
        options:
        - 'facebook/opt-125m'
        - 'google/gemma-4-E2B-it'
        - 'google/gemma-4-E4B-it'
        - 'google/gemma-4-26B-A4B-it'
        - 'google/gemma-4-31B-it'
        - 'google/gemma-2-9b-it'
        - 'mistralai/Mistral-Large-3-675B-Instruct-2512'
        - 'mistralai/Mistral-Small-4-119B-2603'
        - 'mistralai/Mistral-Medium-3.5-128B'
        - 'mistralai/Ministral-3-3B-Instruct-2512'
        - 'mistralai/Ministral-3-8B-Instruct-2512'
        - 'mistralai/Ministral-3-14B-Instruct-2512'
        - 'mistralai/Devstral-2-123B-Instruct-2512'
        - 'mistralai/Codestral-2'
        - 'Qwen/Qwen2.5-Coder-32B-Instruct'
        - 'deepseek-ai/DeepSeek-Coder-V2-Lite-Instruct'
        - 'moonshotai/Kimi-K2.5'
        - 'tiiuae/Falcon3-10B-Instruct'
        - 'meta-llama/Llama-4-Maverick-17B-128E-Instruct'
        - 'Qwen/Qwen3-235B-A22B'
        - 'zai-org/GLM-4.6'
        - 'openai/gpt-oss-120b'
        - 'Qwen/Qwen3-235B-A22B-Instruct-2507'
        - 'deepseek-ai/DeepSeek-V4-Flash'
        - 'deepseek-ai/DeepSeek-V4-Pro'
        - 'deepseek-ai/DeepSeek-V3.2'
        - 'deepseek-ai/DeepSeek-R1'
        - 'meta-llama/Llama-4-Scout-400B-Instruct'
        - 'mistralai/Devstral-2-123B-Instruct'
        - 'mistralai/Codestral-v0.2'
        - 'Qwen/Qwen-3.6-35B-A3B'
        - 'zai-org/GLM-5.1'
        - 'moonshotai/Kimi-K2.6'
        - 'step-ai/Step-3.5-Flash'
        - 'ibm/Granite-4.0-8B-Instruct'
        - 'microsoft/phi-4'
      concurrency_levels:
        description: 'Space-separated concurrency levels'
        required: true
        default: '1 4 16 64 256 1024 4096'
      requests_per_level:
        description: 'Number of requests per concurrency level'
        required: true
        default: '10'
      template:
        description: 'Vast.ai template hash or Docker image'
        required: true
        default: 'ec39532d451faf9c79cddf8566f04b6c'
        type: choice
        options:
        - 'ec39532d451faf9c79cddf8566f04b6c'
        - '119393d230e84d5a0b41972676d23dce'
        - '38b2b68cf896e8582dff6f305a2041b1'
        - 'vllm/vllm-openai:latest'
        - 'eef02f9e58d95382d4bb122a35c7df04'
      disk:
        description: 'Disk size in GB'
        required: true
        default: '40'
      benchmark_type:
        description: 'Benchmark engine to use'
        required: true
        default: 'llmperf'
        type: choice
        options:
        - 'llmperf'
        - 'vllm'
      remote:
        description: 'Run benchmark remotely on Vast.ai instance'
        required: true
        default: false
        type: boolean

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Launch
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        python launch.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --num-gpus "${{ github.event.inputs.num_gpus }}" \
          --model "${{ github.event.inputs.model }}" \
          --template "${{ github.event.inputs.template }}" \
          --disk "${{ github.event.inputs.disk }}"

    - name: Poll
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python poll.py

    - name: Benchmark (Local)
      if: github.event.inputs.remote == 'false'
      run: |
        python benchmark.py \
          --gpu "${{ github.event.inputs.gpu }}" \
          --num-gpus "${{ github.event.inputs.num_gpus }}" \
          --model "${{ github.event.inputs.model }}" \
          --concurrency-levels ${{ github.event.inputs.concurrency_levels }} \
          --requests-per-level ${{ github.event.inputs.requests_per_level }} \
          --benchmark-type "${{ github.event.inputs.benchmark_type }}"

    - name: Benchmark (Remote)
      if: github.event.inputs.remote == 'true'
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N ""
        INSTANCE_ID=$(cat .vast_instance_id)
        vastai attach ssh $INSTANCE_ID ~/.ssh/id_rsa.pub

        # Give it a moment to propagate
        sleep 5

        SSH_URL=$(vastai ssh-url $INSTANCE_ID | tr -d '\r')
        # ssh://root@IP:PORT
        SSH_HOST_PORT=$(echo $SSH_URL | sed 's/ssh:\/\/root@//')
        SSH_IP=$(echo $SSH_HOST_PORT | cut -d: -f1)
        SSH_PORT=$(echo $SSH_HOST_PORT | cut -d: -f2)

        echo "Connecting to $SSH_IP:$SSH_PORT"

        # Wait for SSH to be ready
        TIMEOUT=300
        START_TIME=$(date +%s)
        while ! ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=5 -p $SSH_PORT root@$SSH_IP "exit" 2>/dev/null; do
          CURRENT_TIME=$(date +%s)
          ELAPSED=$((CURRENT_TIME - START_TIME))
          if [ $ELAPSED -gt $TIMEOUT ]; then
            echo "Timeout waiting for SSH"
            exit 1
          fi
          echo "Waiting for SSH ($ELAPSED/s)..."
          sleep 10
        done

        scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -P $SSH_PORT benchmark.py requirements.txt root@$SSH_IP:/root/

        ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -p $SSH_PORT root@$SSH_IP "
          pip install -r requirements.txt
          python3 benchmark.py \
            --model \"${{ github.event.inputs.model }}\" \
            --gpu \"${{ github.event.inputs.gpu }}\" \
            --num-gpus ${{ github.event.inputs.num_gpus }} \
            --url http://localhost:8000 \
            --concurrency-levels ${{ github.event.inputs.concurrency_levels }} \
            --requests-per-level ${{ github.event.inputs.requests_per_level }} \
            --benchmark-type \"${{ github.event.inputs.benchmark_type }}\"
        "

        scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -P $SSH_PORT root@$SSH_IP:/root/benchmark_*.json .
        scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -P $SSH_PORT root@$SSH_IP:/root/results.json .

    - name: Teardown
      if: always()
      env:
        VAST_AI_API_KEY: ${{ secrets.VAST_AI_API_KEY }}
      run: |
        python teardown.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          results.json
          benchmark_*.json
        if-no-files-found: error
